<svg viewBox="0 0 700 170" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%">

  <!-- Baseline -->
  <line x1="40" y1="130" x2="668" y2="130" stroke="#1a1a1a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Curve: starts mid, drops sharply at layoffs, then climbs steadily to peak -->
  <path d="M 40,90 C 70,90 120,95 150,95 C 175,95 200,130 230,135 C 255,138 275,135 300,130 C 325,125 355,105 390,85 C 420,68 460,52 500,42 C 530,35 600,27 668,22"
        stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Key dots -->
  <circle cx="230" cy="135" r="3" fill="#1a1a1a"/>
  <circle cx="390" cy="85" r="2.5" fill="#1a1a1a"/>
  <circle cx="668" cy="22" r="3" fill="#1a1a1a"/>

  <!-- Annotation: drop -->
  <line x1="230" y1="132" x2="230" y2="148" stroke="#1a1a1a" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="230" y="157" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888">No handoff. No ops team.</text>

  <!-- Annotation: recovery begins -->
  <line x1="390" y1="82" x2="390" y2="68" stroke="#1a1a1a" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="383" y="62" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888">QA system built. Packaging gap caught.</text>

  <!-- Annotation: peak -->
  <text x="660" y="14" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" fill="#888">Most relaxed launch they'd ever had.</text>

  <!-- Phase labels -->
  <text x="40"  y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#777">Scoped at 4 months</text>
  <text x="668" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#777">Launch</text>

  <!-- Y caption -->
  <text x="40" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" fill="#999" letter-spacing="0.08em">TEAM CLARITY →</text>

</svg>
